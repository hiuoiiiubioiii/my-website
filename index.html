<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowing Chapters Interface</title>
    <style>
        /* 1. Background -> Deep Black */
        body { 
            margin: 0; display: flex; height: 100vh; overflow: hidden; 
            background-color: #000000; /* Deep Black */
            color: #ffffff; 
            font-family: "Segoe UI", "Roboto", "Courier New", monospace; /* Developer vibe */
        }

        /* 2. Headlines & Subheaders -> Bright lively yellow glowing */
        h1, h2, h3, .glowing-title {
            color: #ffff00;
            text-shadow: 0 0 5px #ffff00, 0 0 10px #ffff00, 0 0 20px #ffcc00;
            text-align: center;
            letter-spacing: 2px;
        }

        /* 3. Diagram lines -> Lively white glowing */
        .glowing-line {
            border: 1px solid #ffffff;
            box-shadow: 0 0 5px #ffffff, 0 0 10px #ffffff;
        }

        /* Sidebar Layout */
        #sidebar { 
            width: 280px; display: flex; flex-direction: column; 
            background: #050505;
            border-right: 2px solid #ffffff; 
            box-shadow: 2px 0 15px rgba(255, 255, 255, 0.4); /* White glow line */
            z-index: 10;
            transition: margin-left 0.4s ease-in-out;
        }

        #sidebar.minimized { margin-left: -280px; box-shadow: none; border-right: none; }

        /* Sketch inverted to show up on black */
        .header-sketch { max-width: 120px; display: block; margin: 20px auto 10px auto; filter: invert(1) drop-shadow(0 0 5px #fff); }

        /* The Read All Button - Active Logic / Yellow Glow */
        #read-all-btn {
            background: #000;
            color: #ffff00;
            font-weight: bold; font-family: inherit; font-size: 16px; text-transform: uppercase;
            padding: 12px; margin: 0 15px 15px 15px;
            border: 2px solid #ffff00; border-radius: 4px; cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.5); 
            text-shadow: 0 0 5px #ffff00;
            transition: 0.3s;
        }
        #read-all-btn:hover { 
            background: #ffff00; color: #000; box-shadow: 0 0 20px #ffff00; text-shadow: none; 
        }

        /* Search Container */
        .search-container { padding: 10px 15px; border-bottom: 2px solid #ffffff; box-shadow: 0 4px 10px -2px rgba(255,255,255,0.4); display: flex; }
        
        /* Variables -> Yellow (Input text is yellow) */
        #search { 
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #555; 
            background: #111; font-family: inherit; color: #ffff00; 
            box-shadow: inset 0 0 5px rgba(255,255,0,0.2); outline: none;
        }
        #search:focus { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
        #search::placeholder { color: #888; text-shadow: none; }
        
        /* Scrollbar styles for the diagram lines vibe */
        #btn-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        #btn-list::-webkit-scrollbar { width: 4px; }
        #btn-list::-webkit-scrollbar-thumb { background: #ffffff; box-shadow: 0 0 10px #ffffff; border-radius: 4px; }

        /* Normal Chapter Buttons */
        .chap-btn { 
            width: 100%; text-align: left; padding: 12px; margin-bottom: 6px; 
            background: transparent; border: 1px solid transparent; border-radius: 4px; cursor: pointer; 
            font-size: 16px; color: #ccc; font-family: inherit; transition: 0.3s;
        }
        
        /* Active Logic -> Yellow Hover & Active states */
        .chap-btn:hover { 
            color: #ffff00; text-shadow: 0 0 8px #ffff00; border-left: 2px solid #ffff00; padding-left: 20px; 
        }
        .chap-btn.active { 
            background: rgba(255, 255, 0, 0.1); color: #ffff00; font-weight: bold; 
            border: 1px solid #ffff00; box-shadow: 0 0 10px rgba(255,255,0,0.4), inset 0 0 10px rgba(255,255,0,0.2);
            text-shadow: 0 0 5px #ffff00;
        }
        
        /* Main viewing area */
        #main-content { 
            flex-grow: 1; display: flex; flex-direction: column; margin: 20px; 
            border-radius: 8px; position: relative;
            background: #050505;
            /* Diagram lines glowing border */
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3), inset 0 0 20px rgba(255,255,255,0.1);
            overflow: hidden; 
        }

        #toggle-btn {
            position: absolute; top: 15px; left: 15px; z-index: 20;
            background: #000; border: 2px solid #ffff00; color: #ffff00;
            font-size: 16px; font-family: inherit; font-weight: bold; text-transform: uppercase;
            cursor: pointer; border-radius: 4px; padding: 8px 12px;
            box-shadow: 0 0 10px rgba(255,255,0,0.4); text-shadow: 0 0 5px #ffff00; transition: 0.3s;
        }
        #toggle-btn:hover { background: #ffff00; color: #000; box-shadow: 0 0 20px #ffff00; text-shadow: none; }

        /* The Iframe for single chapters */
        /* MAGIC TRICK: This filter turns your white HTML pages into Dark Mode instantly */
        iframe { flex-grow: 1; border: none; width: 100%; height: 100%; filter: invert(1) hue-rotate(180deg); }

        /* The container for ALL chapters stacked together */
        #continuous-viewer {
            display: none; 
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 60px;
            color: #eeeeee;
            font-size: 18px;
            line-height: 1.8;
            /* If chapters have white background styles, invert them here too */
            filter: invert(1) hue-rotate(180deg);
            background: #ffffff; /* We set it white so the invert filter turns it black! */
        }

        /* Continuous Viewer Scrollbar */
        #continuous-viewer::-webkit-scrollbar { width: 6px; }
        #continuous-viewer::-webkit-scrollbar-thumb { background: #ffffff; box-shadow: 0 0 10px #ffffff; border-radius: 4px; }

        .continuous-chapter {
            margin-bottom: 80px;
            padding-bottom: 40px;
            /* Diagram line divider */
            border-bottom: 2px solid #ffffff;
            box-shadow: 0 15px 15px -15px rgba(255,255,255,0.5);
        }
        
        /* Subheaders -> lively yellow glowing */
        .continuous-chapter h2 {
            text-align: center; color: #ffff00; font-size: 32px; margin-bottom: 30px;
            text-shadow: 0 0 5px #ffff00, 0 0 10px #ffff00, 0 0 20px #ffcc00;
        }
        
        #loading-text { text-align:center; color:#ffff00; margin-top:50px; text-shadow: 0 0 10px #ffff00; font-weight:bold; letter-spacing: 2px;}
    </style>
</head>
<body>

    <aside id="sidebar">
        <img src="top-sketch.png" class="header-sketch" onerror="this.style.display='none'">
        
        <h3 class="glowing-title">SYS.INDEX</h3>

        <button id="read-all-btn" onclick="loadAllChapters()">[ RUN: READ_ALL ]</button>

        <div class="search-container glowing-line">
            <input type="text" id="search" placeholder="> var search_query = " onkeyup="filterNav()">
        </div>
        <div id="btn-list"></div>
    </aside>

    <main id="main-content">
        <button id="toggle-btn" onclick="toggleSidebar()" title="Toggle Chapters">[ MENU ]</button>
        
        <iframe id="viewer" src="c1.html"></iframe>
        
        <div id="continuous-viewer"></div>
    </main>

    <script>
        const total = 150;
        let allLoaded = false; 
        
        const list = document.getElementById('btn-list');
        const viewer = document.getElementById('viewer');
        const contViewer = document.getElementById('continuous-viewer');
        const sidebar = document.getElementById('sidebar');

        function toggleSidebar() { sidebar.classList.toggle('minimized'); }

        // Generate the 150 buttons
        for(let i = 1; i <= total; i++) {
            let btn = document.createElement('button');
            btn.className = 'chap-btn';
            btn.id = 'btn-' + i;
            btn.innerText = `> chapter_${i}.html`;
            if(i === 1) btn.classList.add('active');
            btn.onclick = () => loadChap(i);
            list.appendChild(btn);
        }

        // --- SINGLE CHAPTER MODE ---
        function loadChap(num) {
            if(num < 1 || num > total) return; 
            
            contViewer.style.display = 'none';
            viewer.style.display = 'block';
            viewer.src = 'c' + num + '.html';
            
            document.querySelectorAll('.chap-btn').forEach(b => b.classList.remove('active'));
            let activeBtn = document.getElementById('btn-' + num);
            if(activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.scrollIntoView({behavior: 'smooth', block: 'nearest'});
            }

            if(window.innerWidth < 800) sidebar.classList.add('minimized');
        }

        // --- CONTINUOUS BOOK MODE (ALL CHAPTERS) ---
        async function loadAllChapters() {
            viewer.style.display = 'none';
            contViewer.style.display = 'block';
            
            document.querySelectorAll('.chap-btn').forEach(b => b.classList.remove('active'));

            if(window.innerWidth < 800) sidebar.classList.add('minimized');

            if (allLoaded) return; 

            contViewer.innerHTML = '<div id="loading-text">Executing fetch command... compiling '+total+' nodes... _</div>';
            
            let fullHTML = '';
            for(let i = 1; i <= total; i++) {
                try {
                    let res = await fetch('c' + i + '.html');
                    if(res.ok) {
                        let text = await res.text();
                        let parser = new DOMParser();
                        let doc = parser.parseFromString(text, 'text/html');
                        
                        fullHTML += `
                            <div class="continuous-chapter" id="full-chap-${i}">
                                <h2>[ CHAPTER ${i} ]</h2>
                                ${doc.body.innerHTML}
                            </div>`;
                    }
                } catch(e) { console.error(`Failed to load Chapter ${i}`); }
            }
            
            contViewer.innerHTML = fullHTML;
            allLoaded = true; 
        }

        function filterNav() {
            let val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.chap-btn').forEach(b => {
                b.style.display = b.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
