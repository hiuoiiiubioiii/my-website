<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 150 Chapters</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: -apple-system, sans-serif; background: #f5f5f7; overflow: hidden; }
        
        /* Sidebar layout */
        #sidebar { width: 280px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .search-container { padding: 15px; border-bottom: 1px solid #ddd; background: #fafafa; }
        #search { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        
        /* Scrollable button list */
        #btn-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .chap-btn { width: 100%; text-align: left; padding: 12px; margin-bottom: 4px; background: none; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; color: #333; }
        .chap-btn:hover { background: #f0f0f0; }
        .chap-btn.active { background: #007aff; color: white; font-weight: bold; }
        
        /* Main viewing area */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        iframe { flex-grow: 1; border: none; width: 100%; background: #fff; }
        
        /* Floating Next/Prev Buttons */
        .nav-controls { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 15px; }
        .nav-controls button { padding: 12px 24px; font-size: 14px; font-weight: bold; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .nav-controls button:hover { background: #1a252f; transform: scale(1.05); }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="search-container">
            <input type="text" id="search" placeholder="Search chapter..." onkeyup="filterNav()">
        </div>
        <div id="btn-list"></div>
    </aside>

    <main id="main-content">
        <iframe id="viewer" src="c1.html"></iframe>
        
        <div class="nav-controls">
            <button onclick="changeChap(-1)">⬅ Previous</button>
            <button onclick="changeChap(1)">Next ➡</button>
        </div>
    </main>

    <script>
        let current = 1;
        const total = 150;
        const list = document.getElementById('btn-list');
        const viewer = document.getElementById('viewer');

        // 1. Generate the 150 buttons
        for(let i = 1; i <= total; i++) {
            let btn = document.createElement('button');
            btn.className = 'chap-btn';
            btn.id = 'btn-' + i;
            btn.innerText = 'Chapter ' + i;
            if(i === 1) btn.classList.add('active'); // Highlight first button
            
            btn.onclick = () => loadChap(i);
            list.appendChild(btn);
        }

        // 2. Load a chapter into the iframe
        function loadChap(num) {
            if(num < 1 || num > total) return; // Prevent going past 1 or 150
            current = num;
            viewer.src = 'c' + current + '.html';
            
            // Update sidebar highlights
            document.querySelectorAll('.chap-btn').forEach(b => b.classList.remove('active'));
            let activeBtn = document.getElementById('btn-' + current);
            activeBtn.classList.add('active');
            
            // Auto-scroll sidebar so active button is visible
            activeBtn.scrollIntoView({behavior: 'smooth', block: 'nearest'});
        }

        // 3. Next/Prev button logic
        function changeChap(direction) {
            loadChap(current + direction);
        }

        // 4. Search bar logic
        function filterNav() {
            let val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.chap-btn').forEach(b => {
                b.style.display = b.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
