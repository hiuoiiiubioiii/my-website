<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Continuous Book</title>
    <style>
        body { margin: 0; display: flex; font-family: Georgia, 'Times New Roman', Times, serif; background: #f4f4f4; color: #333; }
        
        /* The Table of Contents Sidebar */
        #toc {
            width: 250px;
            height: 100vh;
            overflow-y: auto;
            position: fixed;
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        #toc h3 { text-align: center; margin-top: 0; font-family: sans-serif; }
        
        .toc-link {
            display: block;
            padding: 8px 20px;
            color: #555;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
        }

        .toc-link:hover { background: #f0f0f0; color: #000; }

        /* The Main Book Area */
        #book-container {
            margin-left: 250px; /* Leave space for the fixed sidebar */
            padding: 40px;
            width: 100%;
            display: flex;
            justify-content: center; /* Centers the "page" */
        }

        #pages {
            max-width: 800px; /* Book page width */
            width: 100%;
            background: #fff;
            padding: 40px 60px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            line-height: 1.8;
            font-size: 18px;
        }

        .chapter-section {
            margin-bottom: 80px; /* Space between chapters */
            padding-bottom: 40px;
            border-bottom: 2px dashed #ccc;
        }

        .loading { text-align: center; font-family: sans-serif; color: #888; padding: 50px; }

    </style>
</head>
<body>

    <nav id="toc">
        <h3>Table of Contents</h3>
        <div id="toc-list"></div>
    </nav>

    <main id="book-container">
        <div id="pages">
            <div id="status" class="loading">Binding your book... fetching chapters...</div>
        </div>
    </main>

    <script>
        const totalChapters = 150;
        const tocList = document.getElementById('toc-list');
        const pagesContainer = document.getElementById('pages');
        const statusDiv = document.getElementById('status');

        // Function to build the book
        async function buildBook() {
            for (let i = 1; i <= totalChapters; i++) {
                
                // 1. Create the Table of Contents Link
                let link = document.createElement('a');
                link.href = `#chapter-${i}`;
                link.className = 'toc-link';
                link.innerText = `Chapter ${i}`;
                tocList.appendChild(link);

                // 2. Fetch the actual chapter file
                try {
                    // This grabs the file (c1.html, c2.html, etc.)
                    const response = await fetch(`c${i}.html`);
                    
                    if (response.ok) {
                        const htmlText = await response.text();
                        
                        // We use DOMParser to extract just the <body> of your files
                        // so we don't accidentally load 150 <head> tags into one page.
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(htmlText, 'text/html');
                        
                        // 3. Create a wrapper for the chapter
                        let chapterDiv = document.createElement('div');
                        chapterDiv.className = 'chapter-section';
                        chapterDiv.id = `chapter-${i}`; // This matches the TOC link!
                        
                        // Insert the content! Add a title if you want.
                        chapterDiv.innerHTML = `<h1 style="text-align:center; margin-bottom: 40px;">Chapter ${i}</h1>` + doc.body.innerHTML;
                        
                        pagesContainer.appendChild(chapterDiv);
                    }
                } catch (error) {
                    console.error(`Skipping Chapter ${i} - file not found.`);
                }
            }
            
            // Remove the loading message when done
            statusDiv.style.display = 'none';
        }

        // Start building when the page loads
        buildBook();
    </script>
</body>
</html>
