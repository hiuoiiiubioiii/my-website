<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Continuous Book</title>
    <style>
        /* The overall page background */
        body {
            background-color: #f5f5f7;
            font-family: Georgia, 'Times New Roman', serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            color: #333;
            line-height: 1.8;
            font-size: 18px;
        }

        /* The physical "book" container */
        #book-container {
            background-color: #ffffff;
            max-width: 800px;
            width: 100%;
            padding: 60px 80px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 8px;
        }

        /* Styling for each chapter section */
        .chapter {
            margin-bottom: 80px;
            padding-bottom: 40px;
            border-bottom: 2px dashed #eaeaea;
        }

        /* Removes the dashed line after the very last chapter */
        .chapter:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .chapter-title {
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #111;
            margin-bottom: 40px;
            font-size: 28px;
        }

        #loading {
            text-align: center;
            font-family: sans-serif;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="book-container">
        <div id="loading">Gathering all 150 chapters... Please wait.</div>
        </div>

    <script>
        const bookContainer = document.getElementById('book-container');
        const loadingText = document.getElementById('loading');
        const totalChapters = 150;

        async function loadLiveBook() {
            // Loop through numbers 1 to 150
            for (let i = 1; i <= totalChapters; i++) {
                try {
                    // Fetch the live HTML file for the current chapter
                    const response = await fetch(`c${i}.html`);
                    
                    if (response.ok) {
                        const htmlText = await response.text();
                        
                        // Extract only the <body> text so we don't duplicate <head> tags
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(htmlText, 'text/html');
                        const chapterContent = doc.body.innerHTML;

                        // Create a new visual section for this chapter
                        const chapterDiv = document.createElement('div');
                        chapterDiv.className = 'chapter';
                        chapterDiv.id = `chapter-${i}`;
                        
                        // Add the Chapter Title and the text from your file
                        chapterDiv.innerHTML = `
                            <h2 class="chapter-title">Chapter ${i}</h2>
                            ${chapterContent}
                        `;
                        
                        // Append it to the bottom of the book
                        bookContainer.appendChild(chapterDiv);
                    } else {
                        console.warn(`Chapter ${i} not found.`);
                    }
                } catch (error) {
                    console.error(`Error loading Chapter ${i}:`, error);
                }
            }
            
            // Hide the loading text once all chapters are successfully stacked
            loadingText.style.display = 'none';
        }

        // Start building the book the moment the user opens the page
        loadLiveBook();
    </script>

</body>
</html>
